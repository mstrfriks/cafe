<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Room Service</title>
  <link rel="apple-touch-icon" href="/apple-touch-icon3.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0D0D0D;
      --surface: #181818;
      --card:    #202020;
      --border:  #2E2E2E;
      --accent:  #AACC33;
      --text:    #FFFFFF;
      --muted:   #737373;
      --radius:  20px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }

    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    .screen.active {
      display: flex;
      animation: fadeIn .28s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
    @keyframes popIn  { from { opacity: 0; transform: scale(.72); } to { opacity: 1; transform: scale(1); } }

    /* WELCOME */
    #screen-welcome { justify-content: flex-end; background: #000; }
    .welcome-top {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 60px 32px 24px; text-align: center;
    }
    .brand-icon { width: 180px; height: 180px; border-radius: 40px; overflow: hidden; margin-bottom: 32px; }
    .brand-icon img { width: 100%; height: 100%; object-fit: cover; }
    .welcome-top h1 { font-size: 46px; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 14px; }
    .welcome-top p  { font-size: 17px; color: var(--muted); max-width: 280px; line-height: 1.55; }
    .welcome-bottom { width: 100%; padding: 24px 28px 52px; }

    /* BUTTONS */
    .btn {
      display: block; width: 100%; max-width: 480px; margin: 0 auto;
      padding: 20px; font-size: 18px; font-weight: 700; border: none;
      border-radius: 50px; cursor: pointer; transition: transform .12s, opacity .2s;
    }
    .btn + .btn { margin-top: 12px; }
    .btn:active  { transform: scale(.96); }
    .btn-accent  { background: var(--accent); color: #181A08; }
    .btn-accent:disabled { opacity: .3; cursor: default; }

    /* SHARED HEADER */
    .screen-header {
      width: 100%; padding: 22px 22px 18px;
      display: flex; align-items: center; gap: 16px;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .back-btn {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--card); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 19px; cursor: pointer; color: var(--text); flex-shrink: 0;
    }
    .back-btn:active { background: var(--border); }
    .screen-header-text h2 { font-size: 22px; font-weight: 700; }
    .screen-header-text p  { font-size: 14px; color: var(--muted); margin-top: 2px; }
    .screen-scroll {
      width: 100%; flex: 1; overflow-y: auto;
      -webkit-overflow-scrolling: touch; padding: 20px 18px 44px;
    }

    /* ROOM SELECTION */
    #screen-room { background: var(--bg); }
    .rooms-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 11px; max-width: 580px; margin: 0 auto;
    }
    .room-card {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 20px 10px;
      display: flex; flex-direction: column; align-items: center; gap: 9px;
      cursor: pointer; transition: border-color .15s, background .15s, transform .1s;
    }
    .room-card:active { transform: scale(.93); }
    .room-card.selected { border-color: var(--accent); background: rgba(170,204,51,.1); }
    .room-card .room-icon  { font-size: 32px; line-height: 1; }
    .room-card .room-label { font-size: 12.5px; font-weight: 600; text-align: center; line-height: 1.3; }

    /* ORDER SCREEN */
    #screen-order { background: var(--bg); }
    .order-topbar {
      width: 100%; padding: 22px 22px 18px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .order-topbar h1 { font-size: 22px; font-weight: 800; letter-spacing: -.3px; }
    .room-pill {
      background: rgba(170,204,51,.13); border: 1px solid rgba(170,204,51,.32);
      color: var(--accent); border-radius: 50px; padding: 9px 16px;
      font-size: 14px; font-weight: 700; cursor: pointer;
      max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .order-body {
      width: 100%; flex: 1; overflow-y: auto;
      -webkit-overflow-scrolling: touch; padding: 22px 18px 16px;
      display: flex; flex-direction: column; align-items: center;
    }
    .section-label {
      font-size: 12px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: var(--muted);
      align-self: flex-start; margin-bottom: 14px; width: 100%; max-width: 560px;
    }
    .drinks-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 11px; width: 100%; max-width: 560px;
    }
    .drink-btn {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 18px 16px; cursor: pointer;
      transition: border-color .15s, background .15s, transform .1s;
      display: flex; align-items: center; gap: 13px;
      position: relative;
    }
    .drink-btn:active { transform: scale(.96); }
    .drink-btn.selected { border-color: var(--accent); background: rgba(170,204,51,.1); }
    .drink-btn .drink-emoji { font-size: 30px; line-height: 1; flex-shrink: 0; }
    .drink-btn .drink-label { font-size: 15px; font-weight: 600; }
    .qty-badge {
      position: absolute; top: -8px; right: -8px;
      background: var(--accent); color: #181A08;
      font-size: 12px; font-weight: 800;
      min-width: 24px; height: 24px; border-radius: 50px;
      display: none; align-items: center; justify-content: center; padding: 0 5px;
    }
    .order-footer { width: 100%; padding: 14px 18px 44px; flex-shrink: 0; }

    /* CONFIRM */
    #screen-confirm { background: var(--bg); justify-content: center; padding: 40px 28px; }
    .confirm-card {
      display: flex; flex-direction: column; align-items: center;
      gap: 16px; text-align: center;
      animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
    }
    .confirm-check {
      width: 100px; height: 100px; border-radius: 50%;
      background: var(--accent); color: #181A08; font-size: 48px;
      display: flex; align-items: center; justify-content: center; margin-bottom: 8px;
    }
    .confirm-card h2   { font-size: 32px; font-weight: 800; }
    .confirm-card .sub { font-size: 17px; color: var(--muted); line-height: 1.5; margin-top: 4px; }

    /* READY OVERLAY */
    #ready-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.78); z-index: 100;
      align-items: center; justify-content: center; padding: 28px;
    }
    #ready-overlay.visible { display: flex; }
    .ready-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 28px; padding: 52px 36px; text-align: center;
      width: 100%; max-width: 380px;
      animation: popIn .45s cubic-bezier(.34,1.56,.64,1);
    }
    .ready-emoji { font-size: 76px; display: block; margin-bottom: 20px; }
    .ready-card h2 { font-size: 32px; font-weight: 800; margin-bottom: 8px; }
    .ready-card p  { font-size: 17px; color: var(--muted); margin-bottom: 36px; }

    /* CONNECTION DOT */
    #conn-dot {
      position: fixed; bottom: 18px; right: 18px;
      width: 10px; height: 10px; border-radius: 50%;
      background: #444; transition: background .4s;
    }
    #conn-dot.ok  { background: var(--accent); }
    #conn-dot.err { background: #EF5350; }
  </style>
</head>
<body>

<div id="screen-welcome" class="screen active">
  <div class="welcome-top">
    <div class="brand-icon"><img src="/apple-touch-icon3.png" alt="Room Service"></div>
    <h1>Room Service</h1>
    <p>Your personal concierge, always at your fingertips</p>
  </div>
  <div class="welcome-bottom">
    <button id="get-started" class="btn btn-accent">Get Started</button>
  </div>
</div>

<div id="screen-room" class="screen">
  <div class="screen-header">
    <button class="back-btn" id="room-back">←</button>
    <div class="screen-header-text">
      <h2>Choose your room</h2>
      <p>Where should we bring your order?</p>
    </div>
  </div>
  <div class="screen-scroll">
    <div class="rooms-grid" id="rooms-grid"></div>
  </div>
</div>

<div id="screen-order" class="screen">
  <div class="order-topbar">
    <h1>Room Service</h1>
    <button class="room-pill" id="room-pill">— ▾</button>
  </div>
  <div class="order-body">
    <p class="section-label">What would you like?</p>
    <div class="drinks-grid" id="drinks-grid"></div>
  </div>
  <div class="order-footer">
    <button id="order-btn" class="btn btn-accent" disabled>Choose a drink</button>
  </div>
</div>

<div id="screen-confirm" class="screen">
  <div class="confirm-card">
    <div class="confirm-check">✓</div>
    <h2>Order Placed!</h2>
    <p class="sub" id="confirm-text"></p>
  </div>
</div>

<div id="ready-overlay">
  <div class="ready-card">
    <span class="ready-emoji">☕</span>
    <h2>It's Ready!</h2>
    <p>Your order is on its way.</p>
    <button class="btn btn-accent" id="dismiss-ready">Perfect, thank you!</button>
  </div>
</div>

<div id="conn-dot"></div>

<script>
'use strict';

const DEFAULT_ROOMS = [
  { id: 'master',   icon: '👑', label: 'Master Suite' },
  { id: 'room1',    icon: '🛏️', label: 'Room 1' },
  { id: 'room2',    icon: '🛏️', label: 'Room 2' },
  { id: 'room3',    icon: '🛏️', label: 'Room 3' },
  { id: 'room4',    icon: '🛏️', label: 'Room 4' },
  { id: 'office1',  icon: '🖥️', label: 'Office 1' },
  { id: 'office2',  icon: '🖥️', label: 'Office 2' },
  { id: 'dining',   icon: '🍽️', label: 'Dining Room' },
  { id: 'living',   icon: '🛋️', label: 'Living Room' },
  { id: 'gym',      icon: '🏋️', label: 'Gym' },
  { id: 'wellness', icon: '🧘', label: 'Wellness' },
  { id: 'pool',     icon: '🏊', label: 'Pool' },
];

const DEFAULT_DRINKS = [
  { id: 'espresso',   icon: '☕', label: 'Espresso' },
  { id: 'flat-white', icon: '☕', label: 'Flat White' },
  { id: 'cappuccino', icon: '🥛', label: 'Cappuccino' },
  { id: 'black-tea',  icon: '🍵', label: 'Black Tea' },
  { id: 'green-tea',  icon: '🍵', label: 'Green Tea' },
  { id: 'hot-choc',   icon: '🍫', label: 'Hot Chocolate' },
  { id: 'water',      icon: '💧', label: 'Still Water' },
  { id: 'oj',         icon: '🧃', label: 'Orange Juice' },
];

// State
let myRoom         = localStorage.getItem('rs_room') || '';
let currentRooms   = DEFAULT_ROOMS;
let currentDrinks  = DEFAULT_DRINKS;
const drinkQty     = new Map(); // drinkId → qty (0, 1, 2)
let pendingOrderId = null;
let ws;
let reconnectDelay = 1000;

// DOM
const screenWelcome = document.getElementById('screen-welcome');
const screenRoom    = document.getElementById('screen-room');
const screenOrder   = document.getElementById('screen-order');
const screenConfirm = document.getElementById('screen-confirm');
const roomsGrid     = document.getElementById('rooms-grid');
const drinksGrid    = document.getElementById('drinks-grid');
const orderBtn      = document.getElementById('order-btn');
const roomPill      = document.getElementById('room-pill');
const confirmText   = document.getElementById('confirm-text');
const readyOverlay  = document.getElementById('ready-overlay');
const connDot       = document.getElementById('conn-dot');

const ALL_SCREENS = [screenWelcome, screenRoom, screenOrder, screenConfirm];
function showScreen(el) {
  ALL_SCREENS.forEach(s => s.classList.remove('active'));
  el.classList.add('active');
}

// Build rooms grid
function buildRoomsGrid(rooms) {
  roomsGrid.innerHTML = '';
  rooms.forEach(r => {
    const card = document.createElement('button');
    card.className = 'room-card';
    card.innerHTML = `<span class="room-icon">${r.icon}</span><span class="room-label">${r.label}</span>`;
    card.addEventListener('click', () => {
      myRoom = r.label;
      localStorage.setItem('rs_room', myRoom);
      enterOrderScreen();
    });
    roomsGrid.appendChild(card);
  });
}

// Build drinks grid with multi-select + qty
function buildDrinksGrid(drinks) {
  drinksGrid.innerHTML = '';
  drinkQty.clear();
  drinks.forEach(d => {
    drinkQty.set(d.id, 0);
    const btn = document.createElement('button');
    btn.className = 'drink-btn';
    btn.dataset.id = d.id;
    btn.innerHTML = `
      <span class="drink-emoji">${d.icon}</span>
      <span class="drink-label">${d.label}</span>
      <span class="qty-badge"></span>
    `;
    const badge = btn.querySelector('.qty-badge');
    btn.addEventListener('click', () => {
      let qty = drinkQty.get(d.id) || 0;
      qty = (qty + 1) % 3; // 0 → 1 → 2 → 0
      drinkQty.set(d.id, qty);
      if (qty === 0) {
        btn.classList.remove('selected');
        badge.style.display = 'none';
      } else {
        btn.classList.add('selected');
        badge.textContent = qty === 1 ? '×1' : '×2';
        badge.style.display = 'flex';
      }
      updateOrderBtn();
    });
    drinksGrid.appendChild(btn);
  });
}

function updateOrderBtn() {
  const total = [...drinkQty.values()].reduce((a, b) => a + b, 0);
  orderBtn.disabled = total === 0 || !myRoom;
  orderBtn.textContent = total > 0
    ? `Order · ${total} drink${total > 1 ? 's' : ''}`
    : 'Choose a drink';
}

function applyConfig(config) {
  if (config.rooms  && config.rooms.length)  { currentRooms  = config.rooms;  buildRoomsGrid(currentRooms); }
  if (config.drinks && config.drinks.length) { currentDrinks = config.drinks; buildDrinksGrid(currentDrinks); }
}

// Navigation
document.getElementById('get-started').addEventListener('click', () => {
  if (myRoom) enterOrderScreen();
  else showScreen(screenRoom);
});
document.getElementById('room-back').addEventListener('click', () => {
  showScreen(myRoom ? screenOrder : screenWelcome);
});
roomPill.addEventListener('click', () => showScreen(screenRoom));

function enterOrderScreen() {
  roomPill.textContent = `${myRoom} ▾`;
  drinkQty.forEach((_, k) => drinkQty.set(k, 0));
  document.querySelectorAll('.drink-btn').forEach(b => {
    b.classList.remove('selected');
    b.querySelector('.qty-badge').style.display = 'none';
  });
  updateOrderBtn();
  showScreen(screenOrder);
}

// Order
orderBtn.addEventListener('click', () => {
  if (!myRoom || !ws || ws.readyState !== WebSocket.OPEN) return;
  const items = [];
  for (const [id, qty] of drinkQty.entries()) {
    if (qty > 0) {
      const d = currentDrinks.find(x => x.id === id);
      if (d) items.push(qty > 1 ? `${d.label} ×${qty}` : d.label);
    }
  }
  if (!items.length) return;
  const drinkStr = items.join(', ');
  ws.send(JSON.stringify({ type: 'order', name: myRoom, drink: drinkStr }));
  orderBtn.disabled = true;
});

document.getElementById('dismiss-ready').addEventListener('click', () => {
  readyOverlay.classList.remove('visible');
  pendingOrderId = null;
  enterOrderScreen();
});

// WebSocket
function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}`);

  ws.onopen = () => {
    reconnectDelay = 1000;
    connDot.className = 'ok';
    ws.send(JSON.stringify({ type: 'register', role: 'client' }));
  };

  ws.onmessage = ({ data }) => {
    let msg;
    try { msg = JSON.parse(data); } catch { return; }

    if (msg.type === 'config') {
      applyConfig(msg.config);
      return;
    }
    if (msg.type === 'order_confirmed') {
      pendingOrderId = msg.orderId;
      const items = [];
      for (const [id, qty] of drinkQty.entries()) {
        if (qty > 0) {
          const d = currentDrinks.find(x => x.id === id);
          if (d) items.push(qty > 1 ? `${d.label} ×${qty}` : d.label);
        }
      }
      confirmText.textContent = `${items.join(', ')} → ${myRoom}`;
      showScreen(screenConfirm);
      setTimeout(() => {
        if (screenConfirm.classList.contains('active')) enterOrderScreen();
      }, 4000);
    }
    if (msg.type === 'order_ready' && msg.orderId === pendingOrderId) {
      readyOverlay.classList.add('visible');
    }
  };

  ws.onclose = () => {
    connDot.className = 'err';
    setTimeout(connect, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 2, 30000);
  };

  ws.onerror = () => ws.close();
}

// Init
buildRoomsGrid(currentRooms);
buildDrinksGrid(currentDrinks);
connect();
</script>
</body>
</html>
