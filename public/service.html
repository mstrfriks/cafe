<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Service – Café</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #0d1a0d;
      min-height: 100dvh;
      padding: 2rem;
      color: #d4f0d4;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }
    header h1 { font-size: clamp(1.5rem, 4vw, 2rem); font-weight: 300; }
    #dot { width: 12px; height: 12px; border-radius: 50%; background: #555; }
    #dot.connected { background: #6bcf7f; }
    #orders { display: flex; flex-direction: column; gap: 1rem; }
    .order-card {
      background: #1a2e1a;
      border: 1px solid #2d4f2d;
      border-radius: 16px;
      padding: 1.2rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .order-from { font-size: 1.3rem; font-weight: 600; }
    .order-time { font-size: 0.95rem; color: #7fa87f; margin-top: 0.2rem; }
    .done-btn {
      padding: 0.65rem 1.3rem;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      background: linear-gradient(145deg, #3db85a, #256b37);
      color: #fff;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .done-btn:active { transform: scale(0.95); }
    #empty { text-align: center; color: #4a6b4a; font-size: 1.1rem; margin-top: 4rem; }
  </style>
</head>
<body>
  <header>
    <h1>☕ Service café</h1>
    <div id="dot"></div>
  </header>
  <div id="orders"></div>
  <p id="empty">En attente de commandes…</p>
  <script>
    const ordersEl = document.getElementById('orders');
    const emptyEl = document.getElementById('empty');
    const dot = document.getElementById('dot');
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${location.host}`);
    let counter = 0;
    ws.addEventListener('open', () => {
      dot.className = 'connected';
      ws.send(JSON.stringify({ type: 'register', role: 'service' }));
    });
    ws.addEventListener('close', () => { dot.className = ''; });
    ws.addEventListener('message', (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'order') addOrder(msg);
    });
    function addOrder(msg) {
      const id = ++counter;
      emptyEl.style.display = 'none';
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [0, 120].forEach((delay) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.frequency.value = 880;
          gain.gain.setValueAtTime(0.3, ctx.currentTime + delay / 1000);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay / 1000 + 0.3);
          osc.start(ctx.currentTime + delay / 1000);
          osc.stop(ctx.currentTime + delay / 1000 + 0.3);
        });
      } catch {}
      const card = document.createElement('div');
      card.className = 'order-card';
      card.id = `order-${id}`;
      card.innerHTML = `
        <div>
          <div class="order-from">☕ ${escHtml(msg.from)}</div>
          <div class="order-time">${msg.time}</div>
        </div>
        <button class="done-btn" onclick="markDone(${id})">Prêt ✓</button>`;
      ordersEl.prepend(card);
    }
    function markDone(id) {
      ws.send(JSON.stringify({ type: 'done', orderId: id }));
      const card = document.getElementById(`order-${id}`);
      if (card) card.remove();
      if (!ordersEl.children.length) emptyEl.style.display = '';
    }
    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
