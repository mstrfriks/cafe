<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Room Service — Dashboard</title>
  <link rel="apple-touch-icon" href="/apple-touch-icon3.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0D0D0D;
      --surface: #181818;
      --card:    #202020;
      --border:  #2E2E2E;
      --accent:  #AACC33;
      --text:    #FFFFFF;
      --muted:   #737373;
      --radius:  18px;
    }
    html, body { height: 100%; background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: var(--text); -webkit-tap-highlight-color: transparent; }

    header { position: sticky; top: 0; z-index: 10; background: var(--surface); border-bottom: 1px solid var(--border); padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; }
    .header-left h1   { font-size: 24px; font-weight: 800; letter-spacing: -.4px; }
    .header-left span { font-size: 14px; color: var(--muted); display: block; margin-top: 2px; }
    .header-right { display: flex; align-items: center; gap: 14px; }

    #badge { background: var(--accent); color: #181A08; font-size: 15px; font-weight: 800; min-width: 34px; height: 34px; border-radius: 50px; display: flex; align-items: center; justify-content: center; padding: 0 10px; }
    #badge.bump { animation: bump .3s ease; }
    @keyframes bump { 0%,100% { transform: scale(1); } 50% { transform: scale(1.5); } }

    #conn-dot { width: 11px; height: 11px; border-radius: 50%; background: #444; transition: background .4s; }
    #conn-dot.ok  { background: var(--accent); }
    #conn-dot.err { background: #EF5350; }

    #settings-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--card); border: 1px solid var(--border); color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s; }
    #settings-btn:active { background: var(--border); }

    #notif-banner { background: rgba(170,204,51,.1); border-bottom: 1px solid rgba(170,204,51,.2); padding: 14px 24px; display: none; align-items: center; justify-content: space-between; gap: 14px; font-size: 15px; color: var(--accent); }
    #notif-banner.visible { display: flex; }
    #notif-banner button { background: var(--accent); color: #181A08; border: none; border-radius: 50px; padding: 10px 20px; font-size: 14px; font-weight: 700; cursor: pointer; }

    main { padding: 22px 20px 44px; max-width: 820px; margin: 0 auto; }
    #empty { text-align: center; padding: 90px 24px; color: var(--muted); }
    #empty .empty-icon { font-size: 56px; margin-bottom: 16px; opacity: .6; }
    #empty p { font-size: 18px; }
    #order-list { display: flex; flex-direction: column; gap: 13px; }

    .order-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; display: flex; align-items: center; gap: 16px; animation: slideIn .32s cubic-bezier(.25,.8,.25,1); transition: opacity .28s, transform .28s; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-16px) scale(.97); } to { opacity: 1; transform: none; } }
    .order-card.removing { opacity: 0; transform: scale(.94); pointer-events: none; }
    .drink-icon { font-size: 40px; flex-shrink: 0; }
    .order-info { flex: 1; min-width: 0; }
    .order-room  { font-size: 13px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }
    .order-drink { font-size: 18px; font-weight: 700; }
    .order-time  { font-size: 13px; color: var(--muted); margin-top: 5px; }
    .ready-btn { background: var(--accent); color: #181A08; border: none; border-radius: 50px; padding: 14px 22px; font-size: 16px; font-weight: 800; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: transform .1s; }
    .ready-btn:active { transform: scale(.92); }

    /* ── SETTINGS OVERLAY ── */
    #settings-overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 200; flex-direction: column; overflow-y: auto; }
    #settings-overlay.open { display: flex; }

    .settings-header { position: sticky; top: 0; background: var(--surface); border-bottom: 1px solid var(--border); padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; z-index: 10; }
    .settings-header h2 { font-size: 22px; font-weight: 800; }
    .settings-close { width: 40px; height: 40px; border-radius: 50%; background: var(--card); border: 1px solid var(--border); color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    .settings-body { padding: 24px 20px 40px; max-width: 600px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; gap: 36px; }
    .settings-section h3 { font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
    .settings-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
    .settings-item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .settings-item span { font-size: 16px; }
    .del-btn { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 4px 8px; border-radius: 8px; transition: color .15s; }
    .del-btn:active { color: #EF5350; }

    .add-form { display: flex; gap: 8px; align-items: center; }
    .icon-input { width: 56px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; font-size: 20px; text-align: center; color: var(--text); outline: none; }
    .label-input { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; font-size: 15px; color: var(--text); outline: none; }
    .label-input:focus, .icon-input:focus { border-color: var(--accent); }
    .add-btn { background: var(--accent); color: #181A08; border: none; border-radius: 10px; padding: 12px 18px; font-size: 20px; font-weight: 800; cursor: pointer; flex-shrink: 0; }

    .save-btn { display: block; width: calc(100% - 40px); max-width: 560px; margin: 0 auto 40px; padding: 20px; font-size: 18px; font-weight: 700; border: none; border-radius: 50px; background: var(--accent); color: #181A08; cursor: pointer; transition: transform .12s; }
    .save-btn:active { transform: scale(.97); }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>🏨 Room Service</h1>
    <span>Service Dashboard</span>
  </div>
  <div class="header-right">
    <div id="badge">0</div>
    <button id="settings-btn">⚙️</button>
    <div id="conn-dot"></div>
  </div>
</header>

<div id="notif-banner">
  <span>🔔 Enable notifications to be alerted of new orders</span>
  <button id="notif-btn">Enable</button>
</div>

<main>
  <div id="empty"><div class="empty-icon">🛎️</div><p>Waiting for orders…</p></div>
  <div id="order-list"></div>
</main>

<!-- Settings overlay -->
<div id="settings-overlay">
  <div class="settings-header">
    <h2>⚙️ Réglages</h2>
    <button class="settings-close" id="settings-close">✕</button>
  </div>
  <div class="settings-body">
    <div class="settings-section">
      <h3>Pièces</h3>
      <div class="settings-list" id="settings-rooms"></div>
      <div class="add-form">
        <input class="icon-input" id="new-room-icon" placeholder="🛏️" maxlength="4">
        <input class="label-input" id="new-room-label" placeholder="Nom de la pièce">
        <button class="add-btn" id="add-room-btn">+</button>
      </div>
    </div>
    <div class="settings-section">
      <h3>Boissons</h3>
      <div class="settings-list" id="settings-drinks"></div>
      <div class="add-form">
        <input class="icon-input" id="new-drink-icon" placeholder="☕" maxlength="4">
        <input class="label-input" id="new-drink-label" placeholder="Nom de la boisson">
        <button class="add-btn" id="add-drink-btn">+</button>
      </div>
    </div>
  </div>
  <button class="save-btn" id="save-settings">Sauvegarder et fermer</button>
</div>

<script>
'use strict';

const DEFAULT_ROOMS = [
  { id: 'master',  icon: '👑', label: 'Master Suite' },
  { id: 'room1',   icon: '🛏️', label: 'Room 1' },
  { id: 'room2',   icon: '🛏️', label: 'Room 2' },
  { id: 'room3',   icon: '🛏️', label: 'Room 3' },
  { id: 'office1', icon: '🖥️', label: 'Office 1' },
  { id: 'dining',  icon: '🍽️', label: 'Dining Room' },
  { id: 'living',  icon: '🛋️', label: 'Living Room' },
  { id: 'gym',     icon: '🏋️', label: 'Gym' },
  { id: 'pool',    icon: '🏊', label: 'Pool' },
];
const DEFAULT_DRINKS = [
  { id: 'espresso',   icon: '☕', label: 'Espresso' },
  { id: 'flat-white', icon: '☕', label: 'Flat White' },
  { id: 'cappuccino', icon: '🥛', label: 'Cappuccino' },
  { id: 'black-tea',  icon: '🍵', label: 'Black Tea' },
  { id: 'green-tea',  icon: '🍵', label: 'Green Tea' },
  { id: 'hot-choc',   icon: '🍫', label: 'Hot Chocolate' },
  { id: 'water',      icon: '💧', label: 'Still Water' },
  { id: 'oj',         icon: '🧃', label: 'Orange Juice' },
];

function loadConfig() {
  try {
    const saved = localStorage.getItem('rs_config');
    if (saved) return JSON.parse(saved);
  } catch {}
  return { rooms: DEFAULT_ROOMS, drinks: DEFAULT_DRINKS };
}
function saveConfig(cfg) {
  localStorage.setItem('rs_config', JSON.stringify(cfg));
}

let config = loadConfig();

// ── Settings panel ────────────────────────────────────────────────────────────
const settingsOverlay = document.getElementById('settings-overlay');
let editRooms  = [];
let editDrinks = [];

function renderSettingsRooms() {
  const list = document.getElementById('settings-rooms');
  list.innerHTML = '';
  editRooms.forEach((r, i) => {
    const item = document.createElement('div');
    item.className = 'settings-item';
    item.innerHTML = `<span>${r.icon} ${r.label}</span><button class="del-btn" data-i="${i}">✕</button>`;
    item.querySelector('.del-btn').addEventListener('click', () => {
      editRooms.splice(i, 1);
      renderSettingsRooms();
    });
    list.appendChild(item);
  });
}

function renderSettingsDrinks() {
  const list = document.getElementById('settings-drinks');
  list.innerHTML = '';
  editDrinks.forEach((d, i) => {
    const item = document.createElement('div');
    item.className = 'settings-item';
    item.innerHTML = `<span>${d.icon} ${d.label}</span><button class="del-btn" data-i="${i}">✕</button>`;
    item.querySelector('.del-btn').addEventListener('click', () => {
      editDrinks.splice(i, 1);
      renderSettingsDrinks();
    });
    list.appendChild(item);
  });
}

document.getElementById('settings-btn').addEventListener('click', () => {
  editRooms  = JSON.parse(JSON.stringify(config.rooms));
  editDrinks = JSON.parse(JSON.stringify(config.drinks));
  renderSettingsRooms();
  renderSettingsDrinks();
  settingsOverlay.classList.add('open');
});

document.getElementById('settings-close').addEventListener('click', () => {
  settingsOverlay.classList.remove('open');
});

document.getElementById('add-room-btn').addEventListener('click', () => {
  const icon  = document.getElementById('new-room-icon').value.trim() || '🛏️';
  const label = document.getElementById('new-room-label').value.trim();
  if (!label) return;
  editRooms.push({ id: 'r' + Date.now(), icon, label });
  document.getElementById('new-room-icon').value  = '';
  document.getElementById('new-room-label').value = '';
  renderSettingsRooms();
});

document.getElementById('add-drink-btn').addEventListener('click', () => {
  const icon  = document.getElementById('new-drink-icon').value.trim() || '☕';
  const label = document.getElementById('new-drink-label').value.trim();
  if (!label) return;
  editDrinks.push({ id: 'd' + Date.now(), icon, label });
  document.getElementById('new-drink-icon').value  = '';
  document.getElementById('new-drink-label').value = '';
  renderSettingsDrinks();
});

document.getElementById('save-settings').addEventListener('click', () => {
  config = { rooms: editRooms, drinks: editDrinks };
  saveConfig(config);
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'update_config', config }));
  }
  settingsOverlay.classList.remove('open');
});

// ── Drink emoji ───────────────────────────────────────────────────────────────
function emojiFor(drink) {
  const d = config.drinks.find(x => drink.includes(x.label));
  return d ? d.icon : '☕';
}

// ── Audio ─────────────────────────────────────────────────────────────────────
let audioCtx = null;
document.addEventListener('click', () => {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
});

async function playBeep() {
  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') await audioCtx.resume();
  [{ freq: 880, delay: 0 }, { freq: 1100, delay: 220 }].forEach(({ freq, delay }) => {
    setTimeout(() => {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.frequency.value = freq; osc.type = 'sine';
      gain.gain.setValueAtTime(0.45, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.55);
      osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.55);
    }, delay);
  });
}

// ── Notifications ─────────────────────────────────────────────────────────────
const notifBanner = document.getElementById('notif-banner');
function checkNotifPermission() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') notifBanner.classList.add('visible');
}
document.getElementById('notif-btn').addEventListener('click', () => {
  Notification.requestPermission().then(p => {
    if (p !== 'default') notifBanner.classList.remove('visible');
  });
});
function sendNotif(order) {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  new Notification(`New order — ${order.name}`, { body: order.drink, tag: `order-${order.id}` });
}

// ── Orders ────────────────────────────────────────────────────────────────────
const badge     = document.getElementById('badge');
const empty     = document.getElementById('empty');
const orderList = document.getElementById('order-list');
const connDot   = document.getElementById('conn-dot');
const ordersMap = new Map();

function updateBadge() {
  const n = ordersMap.size;
  badge.textContent = n;
  badge.classList.remove('bump');
  void badge.offsetWidth;
  badge.classList.add('bump');
  empty.style.display = n === 0 ? '' : 'none';
}

function timeLabel(ts) {
  const s = Math.round((Date.now() - ts) / 1000);
  if (s < 60) return `${s}s ago`;
  return `${Math.round(s / 60)}min ago`;
}

function addOrder(order) {
  if (ordersMap.has(order.id)) return;
  const card = document.createElement('div');
  card.className = 'order-card';
  card.innerHTML = `
    <span class="drink-icon">${emojiFor(order.drink)}</span>
    <div class="order-info">
      <div class="order-room">${escHtml(order.name)}</div>
      <div class="order-drink">${escHtml(order.drink)}</div>
      <div class="order-time" data-ts="${order.at}">${timeLabel(order.at)}</div>
    </div>
    <button class="ready-btn">Ready ✓</button>
  `;
  card.querySelector('.ready-btn').addEventListener('click', () => markReady(order.id));
  orderList.prepend(card);
  ordersMap.set(order.id, card);
  updateBadge();
}

function removeOrder(id) {
  const card = ordersMap.get(id);
  if (!card) return;
  card.classList.add('removing');
  setTimeout(() => { card.remove(); ordersMap.delete(id); updateBadge(); }, 280);
}

function markReady(id) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'ready', orderId: id }));
}

setInterval(() => {
  document.querySelectorAll('.order-time[data-ts]').forEach(el => {
    el.textContent = timeLabel(Number(el.dataset.ts));
  });
}, 10000);

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
let ws;
let reconnectDelay = 1000;

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}`);

  ws.onopen = () => {
    reconnectDelay = 1000;
    connDot.className = 'ok';
    ws.send(JSON.stringify({ type: 'register', role: 'service' }));
    ws.send(JSON.stringify({ type: 'update_config', config }));
  };

  ws.onmessage = ({ data }) => {
    let msg;
    try { msg = JSON.parse(data); } catch { return; }
    if (msg.type === 'orders')        { msg.orders.forEach(addOrder); return; }
    if (msg.type === 'new_order')     { addOrder(msg.order); playBeep(); sendNotif(msg.order); return; }
    if (msg.type === 'order_removed') { removeOrder(msg.orderId); }
  };

  ws.onclose = () => {
    connDot.className = 'err';
    setTimeout(connect, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 2, 30000);
  };

  ws.onerror = () => ws.close();
}

checkNotifPermission();
connect();
</script>
</body>
</html>
