<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Service — Café</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brown:    #3E2723;
      --caramel:  #A0522D;
      --cream:    #FDF6EE;
      --card:     #FFFFFF;
      --text:     #1A1A1A;
      --muted:    #888;
      --green:    #2E7D32;
      --green-bg: #E8F5E9;
      --red:      #C62828;
      --radius:   16px;
    }

    html, body {
      height: 100%;
      background: #F0EAE2;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--brown);
      color: #fff;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0,0,0,.3);
    }
    header h1 { font-size: 24px; font-weight: 700; letter-spacing: .5px; }
    header .right { display: flex; align-items: center; gap: 14px; }

    #badge {
      background: #FF6F00;
      color: #fff;
      font-size: 16px;
      font-weight: 800;
      min-width: 32px;
      height: 32px;
      border-radius: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 8px;
      transition: transform .2s;
    }
    #badge.bump { animation: bump .3s ease; }
    @keyframes bump { 0%,100% { transform: scale(1); } 50% { transform: scale(1.45); } }

    #conn-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #888;
      transition: background .4s;
    }
    #conn-dot.ok  { background: #69F0AE; }
    #conn-dot.err { background: #FF5252; }

    /* ── Notification permission banner ── */
    #notif-banner {
      background: #FFF8E1;
      border-bottom: 1px solid #FFE082;
      padding: 14px 24px;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 15px;
      color: #4E342E;
    }
    #notif-banner.visible { display: flex; }
    #notif-banner button {
      background: #FF8F00;
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    /* ── Main content ── */
    main {
      padding: 24px;
      max-width: 800px;
      margin: 0 auto;
    }

    /* ── Empty state ── */
    #empty {
      text-align: center;
      padding: 80px 24px;
      color: var(--muted);
    }
    #empty .empty-icon { font-size: 64px; margin-bottom: 16px; }
    #empty p { font-size: 18px; }

    /* ── Order list ── */
    #order-list { display: flex; flex-direction: column; gap: 14px; }

    /* ── Order card ── */
    .order-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px 22px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      animation: slideIn .35s cubic-bezier(.25,.8,.25,1);
      transition: opacity .3s, transform .3s;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-20px) scale(.97); }
      to   { opacity: 1; transform: none; }
    }
    .order-card.removing {
      opacity: 0;
      transform: scale(.95);
      pointer-events: none;
    }

    .drink-icon {
      font-size: 44px;
      line-height: 1;
      flex-shrink: 0;
    }

    .order-info { flex: 1; min-width: 0; }
    .order-name {
      font-size: 22px;
      font-weight: 700;
      color: var(--brown);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .order-drink {
      font-size: 17px;
      color: var(--caramel);
      margin-top: 3px;
    }
    .order-time {
      font-size: 13px;
      color: var(--muted);
      margin-top: 5px;
    }

    .ready-btn {
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 14px 22px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: transform .1s, background .15s;
      -webkit-user-select: none;
      user-select: none;
    }
    .ready-btn:active { transform: scale(0.93); }
  </style>
</head>
<body>

<header>
  <h1>☕ Service</h1>
  <div class="right">
    <div id="badge">0</div>
    <div id="conn-dot"></div>
  </div>
</header>

<div id="notif-banner">
  <span>🔔 Activez les notifications pour être alerté des nouvelles commandes</span>
  <button id="notif-btn">Activer</button>
</div>

<main>
  <div id="empty">
    <div class="empty-icon">🛎️</div>
    <p>En attente de commandes…</p>
  </div>
  <div id="order-list"></div>
</main>

<script>
'use strict';

// ── Drink emoji map ──────────────────────────────────────────────────────────
const DRINK_EMOJI = {
  'Café':           '☕',
  'Café crème':     '☕',
  'Cappuccino':     '🥛',
  'Thé noir':       '🍵',
  'Thé vert':       '🍵',
  'Chocolat chaud': '🍫',
  'Eau':            '💧',
  "Jus d'orange":   '🧃',
};
function emojiFor(drink) { return DRINK_EMOJI[drink] || '☕'; }

// ── Audio beep (Web Audio API) ───────────────────────────────────────────────
let audioCtx = null;

// Unlock AudioContext on first interaction (required by browsers)
document.addEventListener('click', () => {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}, { once: false });

function playBeep() {
  if (!audioCtx) return;
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.frequency.value = 880;
  osc.type = 'sine';
  gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.6);

  // Second tone
  setTimeout(() => {
    if (!audioCtx) return;
    const osc2  = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();
    osc2.connect(gain2);
    gain2.connect(audioCtx.destination);
    osc2.frequency.value = 1100;
    osc2.type = 'sine';
    gain2.gain.setValueAtTime(0.5, audioCtx.currentTime);
    gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
    osc2.start(audioCtx.currentTime);
    osc2.stop(audioCtx.currentTime + 0.5);
  }, 200);
}

// ── Browser notifications ─────────────────────────────────────────────────────
const notifBanner = document.getElementById('notif-banner');
const notifBtn    = document.getElementById('notif-btn');

function checkNotifPermission() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    notifBanner.classList.add('visible');
  }
}

notifBtn.addEventListener('click', () => {
  Notification.requestPermission().then(p => {
    if (p !== 'default') notifBanner.classList.remove('visible');
  });
});

function sendNotif(order) {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  new Notification(`☕ Nouvelle commande — ${order.name}`, {
    body: order.drink,
    icon: '/favicon.ico',
    tag:  `order-${order.id}`,
  });
}

// ── DOM refs ──────────────────────────────────────────────────────────────────
const badge     = document.getElementById('badge');
const empty     = document.getElementById('empty');
const orderList = document.getElementById('order-list');
const connDot   = document.getElementById('conn-dot');

// ── Order state ───────────────────────────────────────────────────────────────
const ordersMap = new Map(); // id → card element

function updateBadge() {
  const n = ordersMap.size;
  badge.textContent = n;
  badge.classList.remove('bump');
  void badge.offsetWidth; // reflow to restart animation
  badge.classList.add('bump');
  empty.style.display = n === 0 ? '' : 'none';
}

function timeLabel(ts) {
  const diff = Math.round((Date.now() - ts) / 1000);
  if (diff < 60) return `il y a ${diff}s`;
  return `il y a ${Math.round(diff / 60)}min`;
}

function addOrder(order) {
  if (ordersMap.has(order.id)) return;

  const card = document.createElement('div');
  card.className = 'order-card';
  card.innerHTML = `
    <span class="drink-icon">${emojiFor(order.drink)}</span>
    <div class="order-info">
      <div class="order-name">${escHtml(order.name)}</div>
      <div class="order-drink">${escHtml(order.drink)}</div>
      <div class="order-time" data-ts="${order.at}">${timeLabel(order.at)}</div>
    </div>
    <button class="ready-btn" data-id="${order.id}">Prêt ✓</button>
  `;

  card.querySelector('.ready-btn').addEventListener('click', () => markReady(order.id));
  orderList.prepend(card);
  ordersMap.set(order.id, card);
  updateBadge();
}

function removeOrder(id) {
  const card = ordersMap.get(id);
  if (!card) return;
  card.classList.add('removing');
  setTimeout(() => {
    card.remove();
    ordersMap.delete(id);
    updateBadge();
  }, 300);
}

function markReady(id) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'ready', orderId: id }));
}

// Refresh "il y a Xs" labels every 10 s
setInterval(() => {
  document.querySelectorAll('.order-time[data-ts]').forEach(el => {
    el.textContent = timeLabel(Number(el.dataset.ts));
  });
}, 10000);

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
let ws;
let reconnectDelay = 1000;

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}`);

  ws.onopen = () => {
    reconnectDelay = 1000;
    connDot.className = 'ok';
    ws.send(JSON.stringify({ type: 'register', role: 'service' }));
  };

  ws.onmessage = ({ data }) => {
    let msg;
    try { msg = JSON.parse(data); } catch { return; }

    if (msg.type === 'orders') {
      // Full list on connect
      msg.orders.forEach(addOrder);
      return;
    }

    if (msg.type === 'new_order') {
      addOrder(msg.order);
      playBeep();
      sendNotif(msg.order);
      return;
    }

    if (msg.type === 'order_removed') {
      removeOrder(msg.orderId);
    }
  };

  ws.onclose = () => {
    connDot.className = 'err';
    setTimeout(connect, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 2, 30000);
  };

  ws.onerror = () => ws.close();
}

// ── Init ──────────────────────────────────────────────────────────────────────
checkNotifPermission();
connect();
</script>
</body>
</html>
